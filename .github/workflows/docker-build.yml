name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(cat VERSION || echo "dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.optimized
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/new-api-custom:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/new-api-custom:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/new-api-custom:${{ steps.version.outputs.short_sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/new-api-custom:latest
          cache-to: type=inline
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed successfully!"
